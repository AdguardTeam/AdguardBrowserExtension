---
version: 2
deployment:
  name: browser extension - deploy firefox beta
  source-plan: ADGEXT-BEFIREFOXBETASPECS
release-naming: ${bamboo.inject.version}-beta
environments:
  - static.adtidy.org
  - GitHub
# TODO(AG-44080): Uncomment after the build plan is imported with firefox-amo.zip artifact.
# Bamboo validates deploy artifact references against the currently published plan,
# so this environment must be added in a follow-up commit after the build plan goes live.
#  - Addons Mozilla

static.adtidy.org:
  triggers: []
  tasks:
    - clean
    - checkout:
        repository: bamboo-deploy-publisher
        path: bamboo-deploy-publisher
        force-clean-build: 'true'
    - artifact-download:
        artifacts:
          - name: firefox.zip
          - name: build.txt
          - name: firefox.xpi
          - name: update.json
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -x
            set -e

            # Fix mixed logs
            exec 2>&1

            ls -la

            ./bamboo-deploy-publisher/deploy.sh firefox-extension-beta
  final-tasks: []
  variables: {}
  requirements: &requirements
    - extension: 'true'

GitHub:
  triggers: []
  tasks:
    - clean
    - checkout:
        repository: bamboo-deploy-publisher
        path: bamboo-deploy-publisher
        force-clean-build: true
    - artifact-download:
        artifacts:
          - name: firefox.zip
          - name: firefox.xpi
          - name: build.txt
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -x
            set -e

            # Fix mixed logs
            exec 2>&1

            ls -la

            # append files to latest Github Releases with correct tag
            GITHUB_TOKEN="${bamboo.githubPublicRepoPassword}" \
            ./bamboo-deploy-publisher/deploy.sh browser-extension-github-beta-firefox
  final-tasks: []
  variables: {}
  requirements: *requirements

