---
version: 2
plan:
  project-key: ADGEXT
  key: BUNDLESIZEUPDATE
  name: Browser Extension - bundle size update
  description: Updates bundle sizes after deployment based on commit messages
variables:
  dockerNode: adguard/extension-builder:22.14--0.2--0

stages:
  - Update Bundle Size:
      manual: false
      final: false
      jobs:
        - Update

Update:
  key: UPDATE
  other:
    clean-working-dir: true
  docker:
    image: ${bamboo.dockerNode}
    volumes:
      ${system.PNPM_DIR}: "${bamboo.cachePnpm}"
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -e
            set -x

            # Fix mixed logs
            exec 2>&1

            # Extract target and build environment from the last commit message
            COMMIT_MSG=$(git log -1 --pretty=%B)

            if [[ "$COMMIT_MSG" =~ "should update bundle sizes for "([^"]*)"#"([^"]*)" after deploy" ]]; then
              BROWSER_TARGET="${BASH_REMATCH[1]}"
              BUILD_ENV="${BASH_REMATCH[2]}"

              echo "Extracted browser target: $BROWSER_TARGET"
              echo "Extracted build environment: $BUILD_ENV"

              # Run the bundle size update script
              echo "Running bundle size update for $BROWSER_TARGET in $BUILD_ENV environment..."
              BUILD_ENV="$BUILD_ENV" TARGET_BROWSER="$BROWSER_TARGET" pnpm update-bundle-size
            else
              echo "Could not extract target and build environment from commit message"
              echo "Commit message: $COMMIT_MSG"
              exit 1
            fi
    - vcs-commit:
        plugin-key: com.atlassian.bamboo.plugins.vcs:task.vcs.commit
        configuration:
          selectedRepository: defaultRepository
          commitMessage: "skipci: update bundle sizes after deploy"
triggers: []

# FIXME: Check, maybe this way is better?
# triggers:
#   - polling:
#       repository: defaultRepository
#       schedule:
#         period: 60
#       triggers-on-commit-message: true
#       include-regex: "should update bundle sizes for [a-zA-Z0-9-]+#[a-zA-Z0-9-]+ after deploy"

branches:
  create: manually
  delete: never
  link-to-jira: "true"

notifications:
  - events:
      - plan-status-changed
    recipients:
      - webhook:
          name: Build webhook
          url: http://prod.jirahub.service.eu.consul/v1/webhook/bamboo
labels: []
other:
  concurrent-build-plugin: system-default
